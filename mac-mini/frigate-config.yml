# Frigate — three Pi Zero cameras, MQTT to local Mosquitto, OpenVINO
# inference on the Mac Mini's Intel UHD 630 iGPU.
#
# This file is rendered by Frigate with `{ENV}` substitutions at startup
# — keep secrets out of here and in /opt/hamster-cam/.env.
#
# See docs/PLAN.md §4 and docs/SETUP_MAC_MINI.md step 8 for the bring-up
# procedure (zone editor, model swap, etc.).
#
# Zone NAMES below must match the narrator's keyword matcher in
# app/server/src/narrator.ts (`matchKeyword`). Supported zone keywords:
#   wheel    — wheel/running activity
#   food     — food bowl / feeding area (also: bowl, feed)
#   water    — water bottle / drinking spot (also: drink)
#   bathroom — potty corner (also: potty, litter, toilet)
#   bed      — sleeping area → 'resting' (also: nest, sleep, rest)
#   tunnel   — tube/pipe enrichment (also: tube, pipe)
#   hide     — hideout / burrow → 'hiding' (also: cave, burrow)
# Any zone name not matching the above falls through to 'exploring'.

mqtt:
  enabled: true
  host: mosquitto
  port: 1883
  # Same broker, same credentials as the backend. PLAN §2.3 + .env.example —
  # one MQTT_USERNAME / MQTT_PASSWORD pair is reused across every client.
  # Frigate only substitutes env vars prefixed with FRIGATE_ (see
  # docker-compose.yml: FRIGATE_MQTT_USERNAME / FRIGATE_MQTT_PASSWORD map
  # the bare MQTT_* values through). A bare {MQTT_USERNAME} raises KeyError.
  user: "{FRIGATE_MQTT_USERNAME}"
  password: "{FRIGATE_MQTT_PASSWORD}"
  topic_prefix: frigate
  client_id: frigate-mac-mini
  stats_interval: 60

# OpenVINO on the iGPU running a CUSTOM single-class hamster model
# (YOLOv9-tiny, trained via scripts/pet-model/ — see docs/HAMSTER_MODEL_PLAN.md).
# COCO has NO rodent class (its `mouse` is a *computer mouse*), so the stock
# ssdlite could never recognize a hamster — this model can. The .onnx and
# labelmap are shipped to the host dir mounted at /config/model_cache (see the
# frigate `volumes:` in docker-compose.yml); they are NOT committed (gitignored).
# To retrain / swap pets, re-run scripts/pet-model/run.sh and replace the files.
detectors:
  ov:
    type: openvino
    device: GPU

model:
  model_type: yolo-generic
  width: 320
  height: 320
  input_tensor: nchw
  input_dtype: float
  path: /config/model_cache/hamster_y9.onnx
  labelmap_path: /config/model_cache/hamster.txt

# Detection defaults applied to every camera. enabled: true is the master
# on-switch for the detect pipeline — the per-camera detect: blocks below only
# set the stream geometry/fps, not whether detection runs. Stated explicitly so
# every camera BOOTS with detection on regardless of Frigate's version default.
# NOTE: toggling detection off in the UI / via MQTT is a runtime override that
# Frigate persists separately; this value is only the startup default.
detect:
  enabled: true

# Defaults applied to every camera unless overridden. Per-PLAN §8 retention
# math: continuous = 3 days, event clips = 30 days.
record:
  enabled: true
  retain:
    days: 3
    mode: motion
  events:
    pre_capture: 5
    post_capture: 5
    retain:
      default: 30
      mode: active_objects

snapshots:
  enabled: true
  timestamp: false
  bounding_box: true
  retain:
    default: 14

# Single custom class from the hamster model. min_score is a real threshold now
# (the old 0.30 was a hack to coax detections out of the wrong COCO classes).
#
# Anti-reflection tuning (2026-05-25):
#   min_score 0.55 — cuts low-confidence glint detections (one-frame flickers);
#     +0.05 from 0.50 is intentionally conservative because genuine detections
#     are currently under-reported; do not exceed 0.60 without verifying true
#     positives in the debug view first.
#
# Threshold raised 0.70 → 0.80 (2026-05-26):
#   Observed false positives on STATIC cage furniture clustering just above 0.70:
#     white bedding fluff  — top ~74%, snapshot ~57%
#     wooden hamster house — top ~71%, snapshot ~77%
#   0.80 filters them with clear margin. NOTE: this is a band-aid. The durable
#   fix is retraining the model with these objects as hard negatives (see
#   docs/HAMSTER_MODEL_TUNING.md). Also tunable: if real hamster events dry up
#   after this change, the model cannot sustain 0.80 — dial back toward 0.75
#   pending a retrain rather than leaving detection dark.
objects:
  track:
    - hamster
  filters:
    hamster:
      min_score: 0.55
      threshold: 0.75

ffmpeg:
  # Detect AND record consume the LOCAL go2rtc restream over loopback (see
  # cameras[].ffmpeg.inputs and the go2rtc block below) — NOT a direct pull from
  # the Pi. This is the single most important property of this stack: go2rtc
  # pulls each Pi Zero exactly ONCE over WiFi, and every downstream consumer
  # (detect, record, MSE/WebRTC live view) fans out from that one pull on the Mini.
  #
  # The Pis now HARDWARE-encode H264 (see pi-zero/go2rtc.yaml), so the Mini does
  # NOT transcode at all — go2rtc just relays the H264 (copy). Detect decodes that
  # H264 in SOFTWARE (cheap at 720p/5fps); no hwaccel here on purpose (the UHD
  # 630's VAAPI decode path crash-loops on any corrupt frame — "Failed to sync
  # surface / hwdownload -5"). record copies the H264 stream straight to disk.
  output_args:
    record: preset-record-generic-audio-copy

# Per-camera blocks. Zones are placeholders — the operator uses Frigate's
# zone editor in the web UI to draw real boxes over each cage and then
# Frigate writes the updated coordinates back into this file. See
# docs/SETUP_MAC_MINI.md step 8.4. Names must match the narrator's
# expectations.
cameras:
  hamster_cam_1:
    ffmpeg:
      inputs:
        # Consume the local go2rtc restream (loopback H264), NOT a 2nd pull from
        # the Pi. go2rtc owns the single WiFi connection to hamster-cam-1; see
        # the ffmpeg: comment above and the go2rtc.streams block below.
        - path: rtsp://127.0.0.1:8554/hamster_cam_1
          input_args: preset-rtsp-restream
          roles:
            - detect
            - record
    detect:
      # Match the Pi's H264 capture (1280x720). The Pis hardware-encode 720p H264
      # (~3 Mbps) so 720p now fits the 2.4GHz radio (see pi-zero/go2rtc.yaml).
      # Zone coordinates are normalized (0–1) so they're unaffected by the change.
      width: 1280
      height: 720
      fps: 5
    objects:
      track:
        - hamster
      filters:
        hamster:
          # Per-camera thresholds mirror the global values above; kept here so
          # each camera can be tuned independently once the operator has debug
          # data. These must be >= the global min_score / threshold to have effect.
          # threshold raised 0.70 → 0.80 (2026-05-26): see global objects comment.
          min_score: 0.55
          threshold: 0.80
          # --- Size / aspect-ratio filters (anti-reflection, 1280×720) ---
          # All values are STARTING POINTS — dial in from the debug view.
          # min_area: reject tiny glints (reflections off glass, water surface,
          #   cage bars). A hamster at any reasonable depth fills ≥~40×38 px;
          #   a glint is typically 10–20 px on a side (100–400 px²).
          #   Raise this if tiny blobs still trigger; lower if cam is far away.
          min_area: 1500
          # max_area: reject large smear artifacts (full-frame reflections,
          #   blown-out highlights). Beyond ~1/9 of 720p frame area the box is
          #   implausibly large for a hamster in this enclosure.
          #   Lower this if the hamster is always far from camera.
          max_area: 80000
          # min_ratio (width/height): hamsters are ~round to slightly elongated;
          #   horizontal smears (water surface, glass reflections) are very flat
          #   (ratio < 0.3). 0.4 cuts them while leaving room for a flattened pose.
          min_ratio: 0.4
          # max_ratio (width/height): a hamster stretched or standing is ~2:1 at
          #   most. Cage-bar vertical artifacts are very tall/thin (ratio > 2.5).
          #   Raise slightly if the wheel produces tall bounding boxes.
          max_ratio: 2.2
          # --- Object mask scaffolding ---
          # Once the operator identifies specific reflective regions in the debug
          # view (Frigate UI → camera → Debug → click bounding boxes to get
          # normalized x,y coordinates), paste polygon coordinates here to
          # permanently exclude those regions from object detection.
          #
          # Format: each mask is a list of normalized (0.0–1.0) x,y pairs,
          # top-left origin, listed clockwise. Multiple masks are supported.
          # Uncomment and replace the placeholder coords with real values.
          #
          # mask:
          #   # Glass front reflection band (example — replace with real coords):
          #   - 0.00,0.90,1.00,0.90,1.00,1.00,0.00,1.00
          #   # Water bowl glint zone (example — replace with real coords):
          #   - 0.60,0.55,0.75,0.55,0.75,0.65,0.60,0.65
          #   # Cage bar vertical artifact (example — replace with real coords):
          #   - 0.48,0.00,0.52,0.00,0.52,1.00,0.48,1.00
    zones:
      wheel:
        coordinates: 0.02,0.05,0.48,0.05,0.48,0.35,0.02,0.35
      food:
        coordinates: 0.52,0.05,0.98,0.05,0.98,0.35,0.52,0.35
      water:
        coordinates: 0.02,0.40,0.48,0.40,0.48,0.65,0.02,0.65
      bathroom:
        coordinates: 0.52,0.40,0.98,0.40,0.98,0.65,0.52,0.65
      bed:
        coordinates: 0.02,0.70,0.34,0.70,0.34,0.98,0.02,0.98
      tunnel:
        coordinates: 0.35,0.70,0.65,0.70,0.65,0.98,0.35,0.98
      hide:
        coordinates: 0.66,0.70,0.98,0.70,0.98,0.98,0.66,0.98

  hamster_cam_2:
    ffmpeg:
      inputs:
        # Consume the local go2rtc restream (loopback H264), NOT a 2nd pull from
        # the Pi. go2rtc owns the single WiFi connection to hamster-cam-2; see
        # the ffmpeg: comment above and the go2rtc.streams block below.
        - path: rtsp://127.0.0.1:8554/hamster_cam_2
          input_args: preset-rtsp-restream
          roles:
            - detect
            - record
    detect:
      # Match the Pi's H264 capture (1280x720). The Pis hardware-encode 720p H264
      # (~3 Mbps) so 720p now fits the 2.4GHz radio (see pi-zero/go2rtc.yaml).
      # Zone coordinates are normalized (0–1) so they're unaffected by the change.
      width: 1280
      height: 720
      fps: 5
    objects:
      track:
        - hamster
      filters:
        hamster:
          # Per-camera thresholds mirror the global values above; kept here so
          # each camera can be tuned independently once the operator has debug
          # data. These must be >= the global min_score / threshold to have effect.
          # threshold raised 0.70 → 0.80 (2026-05-26): see global objects comment.
          min_score: 0.55
          threshold: 0.80
          # --- Size / aspect-ratio filters (anti-reflection, 1280×720) ---
          # All values are STARTING POINTS — dial in from the debug view.
          # min_area: reject tiny glints (reflections off glass, water surface,
          #   cage bars). A hamster at any reasonable depth fills ≥~40×38 px;
          #   a glint is typically 10–20 px on a side (100–400 px²).
          #   Raise this if tiny blobs still trigger; lower if cam is far away.
          min_area: 1500
          # max_area: reject large smear artifacts (full-frame reflections,
          #   blown-out highlights). Beyond ~1/9 of 720p frame area the box is
          #   implausibly large for a hamster in this enclosure.
          #   Lower this if the hamster is always far from camera.
          max_area: 80000
          # min_ratio (width/height): hamsters are ~round to slightly elongated;
          #   horizontal smears (water surface, glass reflections) are very flat
          #   (ratio < 0.3). 0.4 cuts them while leaving room for a flattened pose.
          min_ratio: 0.4
          # max_ratio (width/height): a hamster stretched or standing is ~2:1 at
          #   most. Cage-bar vertical artifacts are very tall/thin (ratio > 2.5).
          #   Raise slightly if the wheel produces tall bounding boxes.
          max_ratio: 2.2
          # --- Object mask scaffolding ---
          # Once the operator identifies specific reflective regions in the debug
          # view (Frigate UI → camera → Debug → click bounding boxes to get
          # normalized x,y coordinates), paste polygon coordinates here to
          # permanently exclude those regions from object detection.
          #
          # Format: each mask is a list of normalized (0.0–1.0) x,y pairs,
          # top-left origin, listed clockwise. Multiple masks are supported.
          # Uncomment and replace the placeholder coords with real values.
          #
          # mask:
          #   # Glass front reflection band (example — replace with real coords):
          #   - 0.00,0.90,1.00,0.90,1.00,1.00,0.00,1.00
          #   # Water bowl glint zone (example — replace with real coords):
          #   - 0.60,0.55,0.75,0.55,0.75,0.65,0.60,0.65
          #   # Cage bar vertical artifact (example — replace with real coords):
          #   - 0.48,0.00,0.52,0.00,0.52,1.00,0.48,1.00
    zones:
      wheel:
        coordinates: 0.02,0.05,0.48,0.05,0.48,0.35,0.02,0.35
      food:
        coordinates: 0.52,0.05,0.98,0.05,0.98,0.35,0.52,0.35
      water:
        coordinates: 0.02,0.40,0.48,0.40,0.48,0.65,0.02,0.65
      bathroom:
        coordinates: 0.52,0.40,0.98,0.40,0.98,0.65,0.52,0.65
      bed:
        coordinates: 0.02,0.70,0.34,0.70,0.34,0.98,0.02,0.98
      tunnel:
        coordinates: 0.35,0.70,0.65,0.70,0.65,0.98,0.35,0.98
      hide:
        coordinates: 0.66,0.70,0.98,0.70,0.98,0.98,0.66,0.98

go2rtc:
  # The Pis HARDWARE-encode H264 now (see pi-zero/go2rtc.yaml), so the Mini does
  # NOT transcode. go2rtc pulls each Pi's H264 RTSP exactly ONCE and relays it
  # (copy) to every consumer: the MSE/WebRTC live view AND — over loopback
  # (rtsp://127.0.0.1:8554/hamster_cam_N) — Frigate's detect+record. One pull per
  # Pi, no re-encode, no iGPU. This replaced the old MJPEG→VAAPI transcode block
  # (the Pis used to ship fat MJPEG that the Mini transcoded to H264); shifting
  # the encode onto the Pi's VideoCore IV cut the WiFi load ~8x and let us return
  # to 720p, and the Mini now does no video work for live view at all.
  #
  # These are go2rtc NATIVE rtsp sources (no `ffmpeg:` prefix): go2rtc's own
  # low-latency RTSP client handles them, defaults to TCP (which H264 wants — it
  # smears on packet loss), and needs none of the -analyzeduration buffering
  # workaround the old MJPEG transcode required.
  #
  # NOTE: {FRIGATE_RTSP_PASSWORD} is substituted by Frigate's template engine
  # before the config reaches the embedded go2rtc — do NOT change it to
  # ${RTSP_PASSWORD} (that go2rtc-native syntax won't have the value, because
  # Frigate's env mapping runs first). Keep any braces here to {FRIGATE_*} only;
  # an unresolved brace aborts go2rtc and takes ALL cameras down.
  streams:
    hamster_cam_1:
      - rtsp://hamster:{FRIGATE_RTSP_PASSWORD}@hamster-cam-1.local:8554/camera
    hamster_cam_2:
      - rtsp://hamster:{FRIGATE_RTSP_PASSWORD}@hamster-cam-2.local:8554/camera

  # WebRTC candidates — required for the WebRTC live-view path to work over
  # the LAN. go2rtc needs to know the Mac Mini's reachable LAN IP so it can
  # include the correct ICE candidate in the offer.
  #
  # OPERATOR ACTION REQUIRED: replace 192.168.1.X below with the Mac Mini's
  # actual LAN IP (the same static-DHCP IP you configured in step 8.2, e.g.
  # `ip -4 addr show | grep "inet "` on the Mini). A wrong IP here means
  # WebRTC negotiation fails and the player falls back to MSE — still
  # low-latency, just not ideal for mobile.
  #
  # Frigate 0.17 does not reliably interpolate {FRIGATE_VAR} inside this
  # nested go2rtc sub-block, so the LAN IP cannot be driven from .env here;
  # it must be set directly. The stun:8555 entry is kept as a fallback for
  # NAT traversal and does not need editing.
  webrtc:
    candidates:
      - 192.168.1.200:8555   # Mac Mini LAN IP (project-server, DHCP-reserved)
      - stun:8555

logger:
  default: info
  logs:
    frigate.app: info
    frigate.mqtt: info
