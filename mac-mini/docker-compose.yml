# Mac Mini Docker Compose stack — hamster-app, Mosquitto, Frigate, Caddy,
# Cloudflare DDNS.
#
# The hamster-app Fastify backend runs as a container (image built on the dev
# machine and docker-loaded here — no build key). Caddy reverse-proxies to it
# via the compose network name `hamster-app:3000`.
#
# Pinned image versions:
#   eclipse-mosquitto:2.0.22                  — MQTT broker (last stable 2.0.x)
#   ghcr.io/blakeblackshear/frigate:0.17.1    — Frigate NVR + AI detector
#   favonia/cloudflare-ddns:1.16.2            — Actively-maintained DDNS updater
#                                               (oznu/cloudflare-ddns is dead, 5yo)
#   hamster-cam/app:local                     — built on dev machine (arm64 → amd64
#                                               cross-build), loaded via docker load
#   Caddy is built locally from ./caddy/Dockerfile pinning caddy:2.11.3 +
#   caddy:2-builder for the xcaddy plugin layer.
#
# Bring-up order (per docs/SETUP_MAC_MINI.md):
#   1) docker compose up -d mosquitto
#   2) docker compose up -d frigate
#   3) docker compose up -d hamster-app
#   4) docker compose up -d cloudflare-ddns caddy

services:
  hamster-app:
    # Image is built on the dev machine (arm64 → amd64 cross-build via buildx)
    # and shipped to the host with `docker save | gzip | ssh | gunzip | docker load`.
    # There is intentionally NO `build:` key here — the host must never build it.
    image: hamster-cam/app:local
    container_name: hamster-app
    restart: unless-stopped
    # Load all shared env vars from the host's .env file.
    env_file: .env
    environment:
      # Override the default relative-path SPA lookup so the static handler
      # finds /app/web/dist inside the container regardless of working directory.
      WEB_DIST_PATH: /app/web/dist
      # Ensure the listen port matches what Caddy proxies to.
      PORT: 3000
    # UID alignment: the container runs as `node` (uid 1000, gid 1000 in all
    # official node images). The host dirs ./db and ./storage must be writable
    # by uid 1000. Simplest approach: set HOST_UID/HOST_GID in .env from the
    # result of `id -u` / `id -g` on the Mac Mini, then chown the dirs once.
    # See docs/SETUP_MAC_MINI.md — "Step 10: App container bind-mount prep".
    #
    # If HOST_UID/HOST_GID are not set, the container falls back to uid 1000.
    # `id -u omegaprime` on the Mini is also 1000 per the live deployment
    # notes, so no chown is required there. Set them explicitly if your user
    # has a different uid (check with: id -u && id -g on the Mac Mini).
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    # Security hardening — Node on a high port needs no Linux capabilities.
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    # Read-only rootfs; only the bind-mounted data dirs and /tmp are writable.
    # /tmp is needed by better-sqlite3 WAL and by any transient ffmpeg work.
    # Verified working in smoke test: `touch /app/test-rw` returns EROFS.
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # SQLite database — persists across container restarts and image updates.
      # Path inside container matches DATABASE_PATH in .env.
      - ./db:/opt/hamster-cam/db
      # Snapshots + nightly time-lapse MP4s.
      # Path inside container matches STORAGE_PATH in .env.
      - ./storage:/opt/hamster-cam/storage
    depends_on:
      mosquitto:
        condition: service_healthy
      frigate:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e",
             "fetch('http://127.0.0.1:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mosquitto:
    image: eclipse-mosquitto:2.0.22
    container_name: hamster-mosquitto
    restart: unless-stopped
    # Only published on localhost — Frigate and the host-side backend both
    # reach it via the compose network (mosquitto:1883) or via 127.0.0.1:1883.
    # If you need an off-host MQTT client, bind to the LAN IP instead.
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      # mosquitto_sub returns immediately on a successful connect-and-subscribe;
      # -E exits as soon as the connection completes. -q 0 keeps the log quiet.
      test:
        - CMD-SHELL
        - >-
          mosquitto_sub -h 127.0.0.1 -p 1883
          -u "$$MQTT_USERNAME" -P "$$MQTT_PASSWORD"
          -t '$$SYS/#' -C 1 -E -W 5 >/dev/null 2>&1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      # Surfaced so the healthcheck can authenticate; the broker itself
      # reads creds from the passwd file inside the config volume.
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}

  frigate:
    image: ghcr.io/blakeblackshear/frigate:0.17.1
    container_name: hamster-frigate
    restart: unless-stopped
    privileged: false
    shm_size: 256mb
    depends_on:
      mosquitto:
        condition: service_healthy
    # Docker's resolver can't resolve the `.local` mDNS camera names in
    # frigate-config.yml, even though the host can. Map each Pi to its
    # static IP here. REQUIRES a DHCP reservation per Pi at the router so
    # the IP never drifts. See docs/SETUP_MAC_MINI.md step 8.2.
    extra_hosts:
      - "hamster-cam-1.local:192.168.1.201"
      - "hamster-cam-2.local:192.168.1.202"
    # iGPU for OpenVINO. /dev/dri must exist on the host (intel-opencl-icd +
    # intel-media-va-driver-non-free, per docs/SETUP_MAC_MINI.md step 3).
    devices:
      - /dev/dri:/dev/dri
    # Caddy reaches Frigate's web UI / API on the compose network at
    # http://frigate:5000, and the host-side backend via
    # host.docker.internal (see app/server/.env: FRIGATE_URL). We also
    # publish 5000 to the LAN for direct access to Frigate's (unauthenticated)
    # web UI — zone editing, model debugging, logs. NOTE (macOS path
    # only): Control Center / AirPlay Receiver squats on host port 5000;
    # disable it (System Settings → General → AirDrop & Handoff) or this
    # won't bind. Ubuntu (the recommended path) has nothing on 5000.
    ports:
      - "5000:5000"
      # WebRTC signalling + media port. Required for go2rtc's WebRTC live-view
      # path (the low-latency fallback after MSE). Both TCP (signalling) and UDP
      # (RTP media) must be exposed. The router does NOT need to forward 8555
      # externally — WebRTC only runs on the LAN; Cloudflare terminates the
      # public-facing connection before it reaches here.
      - "8555:8555/tcp"
      - "8555:8555/udp"
    volumes:
      # NOT read-only: Frigate migrates the config across versions on boot
      # and the built-in zone editor writes zone coordinates back to it.
      - ./frigate-config.yml:/config/config.yml
      - ./storage/frigate:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    environment:
      # Frigate substitutes config {PLACEHOLDERS} only from FRIGATE_-prefixed
      # env vars, so map the shared MQTT creds through prefixed names. The
      # frigate-config.yml references {FRIGATE_MQTT_USERNAME/PASSWORD}.
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD}
      - FRIGATE_MQTT_USERNAME=${MQTT_USERNAME}
      - FRIGATE_MQTT_PASSWORD=${MQTT_PASSWORD}
      # Make the LAN IPs predictable in logs even when running rootless.
      - TZ=${TZ:-Etc/UTC}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    image: hamster-cam/caddy:local
    container_name: hamster-caddy
    restart: unless-stopped
    # CADDY_HTTPS_PORT (default 2053) is the single inbound TCP+UDP port the
    # router forwards. The Cloudflare Origin Rule maps edge :443 → origin
    # :2053 (see docs/PLAN.md §7.2 step 5).
    ports:
      - "${CADDY_HTTPS_PORT:-2053}:${CADDY_HTTPS_PORT:-2053}/tcp"
      - "${CADDY_HTTPS_PORT:-2053}:${CADDY_HTTPS_PORT:-2053}/udp"
    # host.docker.internal is no longer needed for the app (hamster-app is on
    # the compose network now). The camera extra_hosts in the frigate service
    # are still needed; Caddy itself only needs to reach hamster-app:3000.
    depends_on:
      hamster-app:
        condition: service_healthy
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Mount /var/log/caddy so fail2ban on the host (or a sidecar) can tail
      # the JSON access log. Operator must `sudo mkdir -p /var/log/caddy &&
      # sudo chown 1000:1000 /var/log/caddy` once on the Mac Mini.
      - /var/log/caddy:/var/log/caddy
    environment:
      - CADDY_EMAIL=${CADDY_EMAIL}
      - CADDY_HOSTNAME=${CADDY_HOSTNAME}
      - CADDY_HTTPS_PORT=${CADDY_HTTPS_PORT:-2053}
      # Caddyfile uses {env.CLOUDFLARE_API_TOKEN} for the DNS-01 cert
      # challenge (tls { dns cloudflare ... }); without it TLS can't provision.
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    healthcheck:
      # Caddy exposes its admin API on :2019 inside the container.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mosquitto_data:
  mosquitto_log:
  caddy_data:
  caddy_config:
