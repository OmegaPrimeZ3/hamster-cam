# fail2ban filter — match Caddy JSON access-log entries that returned
# 401 or 403 on /auth/* paths. Paired with jail.d/caddy.local.
#
# Caddy's JSON format (per Caddyfile `format json`) produces one object per
# line. A relevant failure entry looks like:
#
#   {"level":"info","ts":1779180000.123,"logger":"http.log.access",
#    "msg":"handled request",
#    "request":{"remote_ip":"203.0.113.42","remote_port":"54321",
#               "client_ip":"203.0.113.42","method":"POST",
#               "uri":"/auth/login","host":"cam.example.com",...},
#    "status":401,"size":...,"duration":...}
#
# We anchor on `client_ip` (Caddy fills this from `X-Forwarded-For` /
# `X-Real-IP` after honoring `trusted_proxies` — falls back to the direct
# `remote_ip`) so Cloudflare-proxied requests get banned at the real
# visitor IP rather than at Cloudflare's edge.
#
# Self-test (run on the Mac Mini after dropping these files in place):
#
#   echo '{"level":"info","ts":1779180000.123,"logger":"http.log.access","msg":"handled request","request":{"remote_ip":"203.0.113.42","client_ip":"203.0.113.42","method":"POST","uri":"/auth/login","host":"cam.example.com"},"status":401,"size":42}' > /tmp/caddy-sample.json
#   fail2ban-regex /tmp/caddy-sample.json /etc/fail2ban/filter.d/caddy-auth.conf
#
# Expected output: "[1] match" on the 401 line. Add a second line with
# status 200 to confirm it does not match.

[INCLUDES]
before = common.conf

[Definition]
# Match a single JSON record where client_ip is some captured value, the
# uri starts with /auth/, and the status is 401 or 403. The regex is
# deliberately permissive about the order of unrelated JSON fields by
# using `.*` between the anchors we care about.
#
# `<HOST>` is the fail2ban macro that captures an IPv4/IPv6 address and
# feeds it back into the ban action.
# Caddy emits the JSON `request` object with `client_ip` consistently before
# `uri` (Caddy 2.x JSON encoder preserves declared field order). One pattern
# covers the documented log shape; verified with `fail2ban-regex` against a
# captured sample (see comment above). If Caddy's order ever changes,
# extend this list with the reordered variant.
failregex = ^.*"client_ip":"<HOST>".*"uri":"/auth/[^"]*".*"status":(?:401|403)\b

ignoreregex =

# Caddy ts is a Unix epoch float, not a RFC3339 string. Use the {EPOCH}
# pattern so fail2ban parses it correctly.
datepattern = "ts":{EPOCH}

journalmatch =
