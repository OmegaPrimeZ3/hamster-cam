# Mosquitto — MQTT broker for the hamster-cam stack.
#
# Loaded by the eclipse-mosquitto:2 container via the docker-compose volume
# mount at /mosquitto/config/mosquitto.conf.
#
# Auth is mandatory — even on the Docker network. The passwd file is created
# by the operator on first bring-up (see README "Configuration & secrets"
# subsection). Procedure:
#   docker compose run --rm --entrypoint sh mosquitto -c \
#     "mosquitto_passwd -b -c /mosquitto/config/passwd \
#      \"$MQTT_USERNAME\" \"$MQTT_PASSWORD\" && chmod 600 /mosquitto/config/passwd"

listener 1883 0.0.0.0
protocol mqtt

# Persistent session and queued-message storage so a Mac Mini reboot doesn't
# lose Frigate's in-flight publishes.
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# Stream logs to stdout so `docker compose logs mosquitto` is the one place
# to look. The container's default also writes /mosquitto/log/mosquitto.log
# (persisted via the named volume) for post-mortem.
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# No anonymous clients. Frigate and the backend both authenticate.
allow_anonymous false
password_file /mosquitto/config/passwd
