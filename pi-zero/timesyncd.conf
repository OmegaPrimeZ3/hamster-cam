# Drop-in for systemd-timesyncd — hardened NTP for hamster-cam Pi Zero 2 W nodes.
#
# Deploy to: /etc/systemd/timesyncd.conf.d/hamster-cam.conf
# (Create the directory first: sudo mkdir -p /etc/systemd/timesyncd.conf.d)
# See docs/SETUP_PI_ZERO.md Step 3b for the full install procedure.
#
# WHY THIS MATTERS
# The Pi Zero 2 W has no hardware RTC. Without NTP every power cycle leaves the
# clock at epoch (or the last saved timestamp), producing timestamps that are
# behind the Mac Mini. When the Mini's zone-visit processor subtracts Pi time
# from server time the result goes negative and diary entries are silently
# dropped. Clock accuracy is load-bearing, not cosmetic.
#
# WHY TIMESYNCD AND NOT CHRONY
# systemd-timesyncd is already on Raspberry Pi OS Lite (no install, no dep).
# SNTP accuracy (~10–50 ms) is more than adequate for sub-second camera event
# timestamps. Chrony would add ~3 MB and a separate config paradigm for no
# measurable benefit at 720p/30fps.

[Time]
# Primary: Cloudflare anycast time — low latency, globally distributed.
# Fallbacks: NTP pool (3 stratum-2 servers for redundancy if Cloudflare is down).
NTP=time.cloudflare.com
FallbackNTP=0.pool.ntp.org 1.pool.ntp.org 2.pool.ntp.org time.google.com

# Reject a server further than 1.5 s root distance (default 5 s is too lenient;
# cheap pool servers can be stratum 2 but still 2–3 seconds off). 1.5 s still
# allows a Pi to sync on initial boot with a stale clock before the first full
# correction, while rejecting clearly bad sources.
RootDistanceMaxSec=1.5

# Poll aggressively on initial boot (minimum 16 s, not the default 32 s) so the
# clock is corrected before go2rtc starts writing timestamps. After the first
# successful sync timesyncd backs off to PollIntervalMaxSec automatically.
PollIntervalMinSec=16
PollIntervalMaxSec=1024

# Save the current time to /var/lib/systemd/timesync/clock every 10 minutes.
# On next boot timesyncd reads this file and sets the clock to "last known time"
# BEFORE making network contact. This prevents the clock from starting at epoch
# and ensures the first timestamps are within minutes of real time even if NTP
# takes a moment to respond. The default is 60 s (too frequent for SD card wear);
# 600 s balances freshness against SD write cycles.
SaveIntervalSec=600
