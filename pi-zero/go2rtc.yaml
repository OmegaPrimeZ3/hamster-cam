# go2rtc — per-Pi RTSP listener for one IMX462 USB camera.
#
# Deployment target: /etc/go2rtc/go2rtc.yaml on each Pi Zero 2 W.
# Secrets (RTSP_PASSWORD) live in /etc/go2rtc/go2rtc.env (chmod 600, root-owned)
# and are loaded by the go2rtc.service unit's EnvironmentFile= directive.
# See docs/SETUP_PI_ZERO.md steps 5–7.
#
# ENCODE AT THE EDGE. The Pi captures MJPEG from the camera, decodes it, and
# HARDWARE-encodes H264 on the VideoCore IV block (/dev/video11, bcm2835-codec)
# via ffmpeg's h264_v4l2m2m. It then ships ~3 Mbps of H264 instead of ~25 Mbps
# of MJPEG — ~8x less data — which is what lets us run 720p over the 2.4GHz-only
# BCM43430 radio without saturating it. (Two 720p MJPEG feeds = ~50 Mbps = past
# the 2.4GHz goodput ceiling = multi-second live lag; that's why we were stuck
# at 480p MJPEG before.) "The Pi can't encode H264" was only ever true for
# SOFTWARE libx264; the hardware encoder does 720p30 at >2x realtime (~1 CPU
# core, just for the MJPEG decode — the encode itself is offloaded to the GPU).
#
# Tunables in the `streams.camera` exec line:
#   -input_format mjpeg  ← IMX462 ships hardware MJPEG over USB (raw YUV at 720p
#                          would exceed USB 2.0 bandwidth). Decoded on-Pi before
#                          re-encode. Confirm formats: `v4l2-ctl --list-formats-ext`.
#   -framerate 30        ← the IMX462 only advertises 30fps discrete at every
#                          resolution, so it captures 30 regardless. H264's tiny
#                          footprint means 30fps is affordable now.
#   -video_size 1280x720 ← 720p H264 ≈ 3 Mbps. 1080x1920 (~4-5 Mbps) is also
#                          viable on this radio if you want it; bump -b:v with it.
#   -c:v h264_v4l2m2m    ← the HARDWARE encoder. Do NOT use libx264 (the A53
#                          can't do it realtime). Needs -pix_fmt yuv420p (the
#                          encoder wants YU12).
#   -b:v 3M / -g 30      ← target bitrate / keyframe every 1s. Raise -b:v if the
#                          VideoCore IV encoder (an old block — softer than x264)
#                          looks too blocky; lower it for more radio headroom.
#
# CAVEAT: H264 is far less tolerant of WiFi packet loss than MJPEG (a lost
# P-frame smears until the next keyframe, vs MJPEG's single-bad-frame). Mitigated
# by H264's small footprint (less airtime → less loss), TCP pull on the Mini, and
# the now-healthy link (power-save off — see wifi-powersave-off.service). If you
# see persistent green-smear artifacts, shorten -g (more keyframes) or drop -b:v.

# go2rtc's built-in HTTP API + web UI. Used by the watchdog to probe liveness
# (curl http://localhost:1984/api/streams) and by humans for stream debugging.
api:
  listen: ":1984"

# RTSP listener locked with username + password. The password is read from the
# RTSP_PASSWORD env var which go2rtc interpolates at startup.
rtsp:
  listen: ":8554"
  username: hamster
  password: ${RTSP_PASSWORD}

# Logging — info is the right balance for a watchdog'd production deployment.
# Bump to "debug" temporarily when troubleshooting; remember to revert before
# the SD card's syslog ring fills.
log:
  level: info
  format: text

# One stream per Pi (each Pi only has one camera attached). Frigate on the Mac
# Mini pulls this as rtsp://hamster:<password>@hamster-cam-N.local:8554/camera.
#
# OUTPUT MUST BE A PIPE (`-f mpegts -`), NOT `-f rtsp {output}`. With the RTSP
# publish form, go2rtc never resolves the H264 profile from h264_v4l2m2m's
# stream (it reports profile=None / no sprop-parameter-sets) and the browser
# MSE live view hangs forever — the `/live/mse/api/ws` socket opens (101) then
# times out with no playable init segment. Piping MPEG-TS to stdout (no
# `{output}`) makes go2rtc parse the elementary stream's in-band SPS/PPS
# directly, so it reports profile=High and MSE works. Verified A/B on-device:
# `-f rtsp` → profile None (live view dead); `-f mpegts -` → profile High.
streams:
  camera:
    - exec:ffmpeg -hide_banner -loglevel warning -f v4l2 -input_format mjpeg -framerate 30 -video_size 1280x720 -i /dev/video0 -c:v h264_v4l2m2m -b:v 3M -g 30 -pix_fmt yuv420p -f mpegts -
