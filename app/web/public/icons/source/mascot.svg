<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hamster Cam mascot — used as the source for pwa-asset-generator's icon and
  splash output. 1024x1024 canvas, all artwork inside an 819x819 maskable
  safe zone (centered) so Android's adaptive-icon mask never clips the ears.
  Aesthetic: rounded, friendly, two-tone pastel — matches the Bubblegum
  default theme.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFE4EE"/>
      <stop offset="100%" stop-color="#FFC1D8"/>
    </radialGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD9A8"/>
      <stop offset="100%" stop-color="#E8AD6F"/>
    </linearGradient>
    <linearGradient id="ear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFC8DC"/>
      <stop offset="100%" stop-color="#F49AB9"/>
    </linearGradient>
  </defs>

  <!-- background safe zone (filled to the edges; mask handles the round cut) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- ears -->
  <ellipse cx="370" cy="320" rx="80" ry="100" fill="#E8AD6F"/>
  <ellipse cx="654" cy="320" rx="80" ry="100" fill="#E8AD6F"/>
  <ellipse cx="370" cy="340" rx="46" ry="64" fill="url(#ear)"/>
  <ellipse cx="654" cy="340" rx="46" ry="64" fill="url(#ear)"/>

  <!-- head -->
  <ellipse cx="512" cy="540" rx="280" ry="252" fill="url(#body)"/>

  <!-- cheeks -->
  <ellipse cx="350" cy="610" rx="60" ry="48" fill="#FFB6C9" opacity="0.85"/>
  <ellipse cx="674" cy="610" rx="60" ry="48" fill="#FFB6C9" opacity="0.85"/>

  <!-- eyes -->
  <ellipse cx="430" cy="510" rx="34" ry="40" fill="#1E1A2A"/>
  <ellipse cx="594" cy="510" rx="34" ry="40" fill="#1E1A2A"/>
  <circle cx="442" cy="498" r="11" fill="#FFFFFF"/>
  <circle cx="606" cy="498" r="11" fill="#FFFFFF"/>

  <!-- nose -->
  <path d="M 488 590 Q 512 612 536 590 Q 512 624 488 590 Z" fill="#9B4F70"/>

  <!-- mouth -->
  <path d="M 470 626 Q 512 654 554 626" fill="none" stroke="#1E1A2A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- whiskers -->
  <g stroke="#1E1A2A" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M 310 612 L 226 596"/>
    <path d="M 310 632 L 222 638"/>
    <path d="M 714 612 L 798 596"/>
    <path d="M 714 632 L 802 638"/>
  </g>
</svg>
