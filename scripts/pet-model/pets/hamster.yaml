# Hamster detection model for the remy-hamster Frigate stack.
# See docs/HAMSTER_MODEL_PLAN.md §2 for the dataset review.
#
# Run:
#   export ROBOFLOW_API_KEY=rf_xxx
#   ./scripts/pet-model/run.sh scripts/pet-model/pets/hamster.yaml

class_name: hamster
work_dir: ~/pet-models/hamster

# The 3 largest public hamster sets from Roboflow Universe (runbook §2),
# merged + remapped to a single `hamster` class.
#
# Slug existence confirmed on Roboflow Universe:
#   hamsterhams/hamsters-vohzn  ~223 imgs, CC BY 4.0, classes grayhamster/spotted/wheel
#   nathan-cqd2g/hamster-detection ~112 imgs (versions seen up to v3)
#   test-pq3k6/hamster-0ip1u    ~100 imgs (hosted model at v2)
#
# IMPORTANT: the SDK download needs the EXACT version that exists. The version
# numbers below are best-known guesses; the pipeline FAILS LOUDLY with the
# offending slug if a version 404s. To get the canonical version, open the
# dataset on Universe -> "Download Dataset" -> format "YOLOv8" and read the
# rf.workspace("..").project("..").version(N) snippet, then set N here.
datasets:
  - workspace: hamsterhams
    project: hamsters-vohzn
    version: 1
  - workspace: nathan-cqd2g
    project: hamster-detection
    version: 3
  - workspace: test-pq3k6
    project: hamster-0ip1u
    version: 2
  # --- Phase F expansion (versions verified live via the Roboflow API) ---
  - workspace: pet-monitor          # ~1521 imgs, cage/pet-monitor domain (closest match)
    project: hamster-k5ngx
    version: 1
  - workspace: guagua               # ~443 imgs
    project: hamster
    version: 2
  - workspace: rat01                # ~75 imgs (2024)
    project: hamster-xqr4j
    version: 2

# --- TUNING (docs/HAMSTER_MODEL_TUNING.md) — cage fine-tune held pending review ---
# Multi-rodent set — guinea-pig boxes remap to `hamster` (class 0). Enable only if
# Phase J shows it doesn't add confusing non-hamster shapes:
#   - workspace: tpicos-2-maurcio
#     project: hamster-and-guinea-pig
#     version: 3
#
# --- v3 precision pass (docs/HAMSTER_MODEL_TUNING.md Phase H) ---
# Background NEGATIVES harvested from the live cage: empty cage, white bedding
# fluff, the wooden house, glass/water reflections — the exact static objects the
# v1/v2 model false-fires on (confirmed in Frigate events, scoring ~71–77%).
# Negatives need no boxes; they teach the model "no hamster here," killing the
# false positives at the source. The 523 NIGHT positives at cage_pos stay OUT
# until [HUMAN] box-review — the current model's auto-labels are contaminated
# with these same false fires, so training on them unreviewed would teach
# fluff/house == hamster. Re-enable cage_pos for a later recall pass.
local_sources:
  - path: ~/pet-models/hamster/local/cage_neg
    role: negative
  # - path: ~/pet-models/hamster/local/cage_pos   # enable after box-review (recall pass)
  #   role: positive
local_oversample: 1   # 600 harvested negatives are ~18-22% of the ~2700 public
                      # positives already — a healthy background ratio. Oversampling
                      # would push past the runbook's ≤40% ceiling and collapse the
                      # model toward "never fire." Keep at 1x.

# Phase I domain augmentation — forwarded to Ultralytics model.train() verbatim.
# Simulates the day↔night/IR brightness range and the camera's ~45° angle.
augment:
  hsv_v: 0.5      # brightness jitter — highest-value aug for day/night robustness
  hsv_s: 0.4
  degrees: 8
  scale: 0.5
  translate: 0.1
  fliplr: 0.5
  flipud: 0.0     # a hamster is never upside-down to the camera
  close_mosaic: 10

base_model: yolov9t.pt
imgsz: 320
epochs: 150
batch: 32
patience: 50
device: mps
val_split: 0.20

frigate:
  min_score: 0.50
  threshold: 0.60

gates:
  min_train_images: 350
  min_map50: 0.85
